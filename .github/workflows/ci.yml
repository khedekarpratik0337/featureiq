name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev --extras meta
      - name: Run linting
        run: |
          poetry run black --check featureiq/ tests/
          poetry run isort --check featureiq/ tests/
          poetry run flake8 featureiq/ tests/
      - name: Run type checking
        run: poetry run mypy featureiq/
      - name: Run tests
        run: poetry run pytest --cov=featureiq --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
